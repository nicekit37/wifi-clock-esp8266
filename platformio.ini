; PlatformIO Project Configuration File
; Настройки TFT: include/User_Setup.h (ST7789). TFT_eSPI: lib/TFT_eSPI (PATCHES.md).

[platformio]
default_envs = esp12e

[env:esp12e]
platform = espressif8266
board = esp12e
board_build.ldscript = eagle.flash.4m2m.ld
framework = arduino
board_build.filesystem = littlefs

monitor_port = COM3
monitor_speed = 115200
monitor_filters = 
    default
    time

upload_port = COM3
upload_speed = 921600
upload_resetmethod = nodemcu
monitor_dtr = 0
monitor_rts = 0

lib_deps = 
    time@^1.6.1
    ESP8266WebServer@^1.0.0
    ArduinoJson@^6.21.3

; TFT_eSPI: lib/TFT_eSPI (PATCHES.md). Настройки дисплея: include/User_Setup.h + lib/TFT_eSPI/User_Setup.h (копии).
; CS = GND (заземлен, TFT_CS = -1)
; DC = GPIO0 (D3, PIN_D3)
; RST = GPIO2 (D4, PIN_D4)
; BLK = GPIO5 (D1, PIN_D1)
